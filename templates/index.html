cat > templates/index.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Brain - RAG System</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <div class="container">
        <h1>🧠 Enterprise Brain</h1>
        
        <div class="upload-section">
            <h2>📄 Upload PDF Document</h2>
            <input type="file" id="pdfFile" accept=".pdf">
            <br>
            <button onclick="uploadPDF()">Upload & Train</button>
            <div id="uploadStatus"></div>
        </div>

        <div class="chat-section">
            <h2>💬 Ask Questions</h2>
            <div id="chatBox"></div>
            <div class="input-group">
                <input type="text" id="questionInput" placeholder="Ask a question about your document..." onkeypress="if(event.key==='Enter') askQuestion()">
                <button onclick="askQuestion()">Ask</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
EOF
